<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wall Detection Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #16213e; border-bottom: 1px solid #0f3460; }
  .header h1 { font-size: 18px; color: #e94560; }

  .nav { display: flex; align-items: center; gap: 12px; padding: 8px 20px; background: #16213e; border-bottom: 1px solid #0f3460; }
  .nav button { padding: 6px 18px; border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .nav button:hover { background: #0f3460; }
  .nav button:disabled { opacity: 0.4; cursor: default; }
  .nav .spacer { flex: 1; }
  .nav .container-names { font-size: 16px; font-weight: bold; color: #53cfff; }
  .nav .counter { font-size: 14px; color: #aaa; }

  .meta-bar { display: flex; gap: 20px; padding: 6px 20px; font-size: 14px; color: #aaa; }
  .meta-bar .lw { color: #00bcd4; font-weight: bold; }
  .meta-bar .rw { color: #ff9800; font-weight: bold; }

  .legend { padding: 4px 20px; font-size: 12px; color: #666; }

  .canvas-wrap { margin: 8px 20px; background: #000; border: 1px solid #333; }
  .canvas-wrap canvas { display: block; width: 100%; }

  .shortcuts { padding: 8px 20px; font-size: 12px; color: #666; text-align: center; }
  .shortcuts kbd { padding: 1px 5px; border: 1px solid #555; border-radius: 3px; background: #222; color: #aaa; font-family: monospace; }
</style>
</head>
<body>

<div class="header">
  <h1>Wall Detection Review</h1>
  <div class="legend">
    <span style="color:#00bcd4">&#9474; Cyan = Left Wall (LW)</span> &nbsp;&nbsp;
    <span style="color:#ff9800">&#9474; Orange = Right Wall (RW)</span>
  </div>
</div>

<div class="nav">
  <button id="btnPrev" onclick="navigate(-1)">&larr; Prev</button>
  <button id="btnNext" onclick="navigate(1)">Next &rarr;</button>
  <button style="background:#1b5e20;border-color:#2e7d32;color:#a5d6a7;font-weight:bold" onclick="setVerdict('walls_correct')">Walls Correct</button>
  <button style="background:#b71c1c;border-color:#c62828;color:#ef9a9a;font-weight:bold" onclick="setVerdict('walls_wrong')">Walls Wrong</button>
  <div class="spacer"></div>
  <div class="container-names" id="containerNames">---</div>
  <div class="spacer"></div>
  <div id="verdictDisplay" style="font-size:13px"></div>
  <div class="counter" id="counter">-</div>
</div>

<div class="meta-bar">
  <span>Left Wall: <span class="lw" id="lwVal">-</span></span>
  <span>Right Wall: <span class="rw" id="rwVal">-</span></span>
  <span>Span: <span id="spanVal" style="color:#fff">-</span></span>
  <span>Image: <span id="imgDims" style="color:#fff">-</span></span>
</div>

<div class="canvas-wrap">
  <canvas id="mainCanvas"></canvas>
</div>

<div class="shortcuts">
  <kbd>&larr;</kbd> Previous &nbsp; <kbd>&rarr;</kbd> Next &nbsp; <kbd>Y</kbd> Walls Correct &nbsp; <kbd>N</kbd> Walls Wrong &nbsp; <span id="statusMsg" style="color:#00e676"></span>
</div>

<script>
let jobs = [];
let currentIdx = 0;
let currentImg = null;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

async function load() {
  const res = await fetch('/api/split/jobs/all');
  const all = await res.json();
  jobs = all.filter(j => j.container_numbers !== 'TEST001,TEST002');
  currentIdx = 0;
  showCurrent();
}

function navigate(delta) {
  currentIdx = Math.max(0, Math.min(jobs.length - 1, currentIdx + delta));
  showCurrent();
}

function showCurrent() {
  if (!jobs.length) return;
  const job = jobs[currentIdx];

  document.getElementById('counter').textContent = `${currentIdx + 1} of ${jobs.length}`;
  document.getElementById('containerNames').textContent = job.container_numbers;
  document.getElementById('lwVal').textContent = job.left_wall_x != null ? job.left_wall_x + 'px' : '-';
  document.getElementById('rwVal').textContent = job.right_wall_x != null ? job.right_wall_x + 'px' : '-';
  const span = (job.left_wall_x != null && job.right_wall_x != null) ? (job.right_wall_x - job.left_wall_x) + 'px' : '-';
  document.getElementById('spanVal').textContent = span;
  document.getElementById('imgDims').textContent = `${job.image_width} x ${job.image_height}`;
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx >= jobs.length - 1;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    currentImg = img;
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    // Cyan: left wall
    if (job.left_wall_x != null) {
      ctx.strokeStyle = 'rgba(0, 188, 212, 0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(job.left_wall_x, 0);
      ctx.lineTo(job.left_wall_x, img.height);
      ctx.stroke();
      ctx.fillStyle = 'rgba(0, 188, 212, 0.95)';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('LW', job.left_wall_x + 5, 22);
    }

    // Orange: right wall
    if (job.right_wall_x != null) {
      ctx.strokeStyle = 'rgba(255, 152, 0, 0.9)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(job.right_wall_x, 0);
      ctx.lineTo(job.right_wall_x, img.height);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 152, 0, 0.95)';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText('RW', job.right_wall_x - 35, 22);
    }
  };
  img.src = `/api/split/${job.id}/original?t=${Date.now()}`;
  updateVerdictDisplay();
  document.getElementById('statusMsg').textContent = '';
}

async function setVerdict(verdict) {
  if (!jobs.length) return;
  const job = jobs[currentIdx];
  try {
    const res = await fetch(`/api/split/${job.id}/wall-verdict`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wall_verdict: verdict })
    });
    if (res.ok) {
      job._wall_verdict = verdict;
      updateVerdictDisplay();
      document.getElementById('statusMsg').textContent = `Saved: ${verdict}`;
      setTimeout(() => { if (currentIdx < jobs.length - 1) navigate(1); }, 300);
    }
  } catch (err) {
    document.getElementById('statusMsg').textContent = `Error: ${err.message}`;
  }
}

function updateVerdictDisplay() {
  const job = jobs[currentIdx];
  const v = job._wall_verdict || job.wall_verdict;
  const el = document.getElementById('verdictDisplay');
  if (v === 'walls_correct') el.innerHTML = '<span style="color:#a5d6a7">&#10003; Correct</span>';
  else if (v === 'walls_wrong') el.innerHTML = '<span style="color:#ef9a9a">&#10007; Wrong</span>';
  else el.innerHTML = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
  else if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); setVerdict('walls_correct'); }
  else if (e.key === 'n' || e.key === 'N') { e.preventDefault(); setVerdict('walls_wrong'); }
});

load();
</script>
</body>
</html>
